name: Deploy to Azure VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy application
        run: |
          cd /home/azureuser/clothing-company-web
          git pull origin main
          .venv/bin/pip install -r requirements.txt
          pkill -f "uvicorn" || true
          sleep 2
          nohup .venv/bin/uvicorn main:app --host 0.0.0.0 --port 8000 > /tmp/app8000.log 2>&1 &
          nohup .venv/bin/uvicorn main:app --host 0.0.0.0 --port 8001 > /tmp/app8001.log 2>&1 &
          echo "Deployment successful!"